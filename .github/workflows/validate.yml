name: validate-dataset

on:
  push:
    branches:
      - "**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate packaged dataset if present
        run: |
          if [ -d "dist/tts_dataset_ready" ]; then
            python scripts/validate_dataset.py --dataset_dir dist/tts_dataset_ready
          elif [ -d "tts_export" ]; then
            echo "dist/tts_dataset_ready not found; skipping strict validation."
            echo "Run scripts/pack_release.py first to produce release artifacts."
          else
            echo "No dataset directory found to validate."
          fi
